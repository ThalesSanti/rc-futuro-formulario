<script type="text/javascript">
    (function (formId) {
        let form = document.getElementById(formId);

        function tyExtractSequence(value, sequence, separator) {
            return sequence
                .reduce((a, b) => {
                    const skip = a.reduce((a, b) => a + b.length, 0);

                    const index = value.substring(skip).indexOf(separator);
                    const end = skip + (index === -1 ? b : index + 1);

                    return [
                        ...a,
                        value.substring(skip, end),
                    ];
                }, [])
                .map((item) => item.replace(/\//g, ''));
        }

        Array.from(form.querySelectorAll('[ty-mask="phone"]'))
            .forEach((element) => {
                element.addEventListener('input', (event) => {
                    const { target } = event;

                    target.value = target.value.replace(/[^0-9() ]/g, '');
                });

                element.addEventListener('change', (event) => {
                    const { target } = event;

                    if (target.value.trim() === '') {
                        return;
                    }

                    const phone = target.value.replace(/[^0-9]/g, '');
                    const ddd = phone.substring(0, 2);
                    const number = phone.substring(2);

                    target.value = `(${ddd}) ` + tyExtractSequence(number, [number.length === 8 ? 4 : 5, 4], '-').join('-');
                });
            });

        function tySearchCep(cep) {
            return new Promise((resolve) => {
                const xhr = new XMLHttpRequest();

                xhr.open("GET", `https://viacep.com.br/ws/${cep}/json`);

                xhr.addEventListener('readystatechange', (event) => {
                    if (xhr.readyState == 4 && xhr.status == 200) {
                        resolve(JSON.parse(xhr.response));
                    }
                });

                xhr.send();
            });
        }

        form.querySelectorAll('[name^="enderecos["][name$="][cep]"]').forEach((element) => {
            element.addEventListener('blur', (event) => {
                const { name, value } = event.target;

                tySearchCep(value)
                    .then((address) => {
                        const prefix = name.substring(0, name.length - 5);

                        form.querySelector(`[name="${prefix}[endereco]"]`).value = address.logradouro;
                        form.querySelector(`[name="${prefix}[bairro]"]`).value = address.bairro;
                        form.querySelector(`[name="${prefix}[cidade]"]`).value = address.localidade;
                        form.querySelector(`[name="${prefix}[estado]"]`).value = address.uf;
                    });
            });
        });
        function tySendForm(url, data) {
            return new Promise((resolve) => {
                const encondedDataPairs = [];

                for (const name in data) {
                    encondedDataPairs.push(
                        `${encodeURIComponent(name)}=${encodeURIComponent(data[name])}`,
                    );
                }

                const urlEncodedData = encondedDataPairs.join("&").replace(/%20/g, "+");

                const xhr = new XMLHttpRequest();

                xhr.open("POST", url);

                xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");

                xhr.addEventListener('readystatechange', (event) => {
                    if (xhr.readyState == 4) {
                        resolve({
                            status: xhr.status,
                            data: xhr.response
                        });
                    }
                });

                xhr.send(urlEncodedData);
            });
        }

        form.addEventListener('submit', (event) => {
            event.preventDefault();

            const { target } = event;

            const formData = Object.fromEntries(new FormData(target));

            const elEnviando = form.querySelector('.mensagem-enviando');

            if (elEnviando != null) {
                elEnviando.style.display = 'block';
            }

            tySendForm(target.action, formData)
                .then((response) => {
                    if (elEnviando != null) {
                        elEnviando.style.display = 'none';
                    }

                    try {
                        const data = JSON.parse(response.data);

                        if (response.status == 200) {
                            form.querySelector('.mensagem-erro').style.display = 'none';
                            form.querySelector('.mensagem-sucesso').innerHTML = data.message;
                            form.querySelector('.mensagem-sucesso').style.display = 'block';
                        } else {
                            throw data.message;
                        }
                    } catch (error) {
                        form.querySelector('.mensagem-sucesso').style.display = 'none';
                        form.querySelector('.mensagem-erro').innerHTML = error;
                        form.querySelector('.mensagem-erro').style.display = 'block';
                    }
                });
        });
    })('trinity-form-wl6UL4AE')
</script>
