<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RC Futuro - Cadastro de Clientes</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="RC Futuro">

<h1>Cadastro de Clientes</h1>

<p>
Selecione abaixo o tipo de cadastro.
</p>

<div class="botoes">

<button id="btnPF" class="ativo">
Pessoa Física
</button>

<button id="btnPJ">
Pessoa Jurídica
</button>

</div>

<div class="formulario">

<iframe
id="frame"
src="pf.html"
frameborder="0">
</iframe>

</div>

</div>

<script>

const frame = document.getElementById("frame");

const pf = document.getElementById("btnPF");

const pj = document.getElementById("btnPJ");

pf.onclick = function(){

frame.src="pf.html";

pf.classList.add("ativo");

pj.classList.remove("ativo");

}

pj.onclick = function(){

frame.src="pj.html";

pj.classList.add("ativo");

pf.classList.remove("ativo");

}

</script>

</body>

</html>
